<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รวยๆ บาคาร่า</title>
    <style>
        :root {
            --bg-dark: #0f121d;
            --card-dark: #161b29;
            --primary-blue: #3263ff;
            --primary-red: #f44336;
            --primary-green: #4caf50;
            --text-gold: #ffb400;
        }
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: #fff; margin: 0; padding: 5px; display: flex; justify-content: center; overflow: hidden; height: 100vh; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
        .header-area { display: flex; justify-content: flex-end; padding: 2px 0; }
        .settings-btn { background: rgba(255, 180, 0, 0.1); border: 1px solid var(--text-gold); color: var(--text-gold); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .prediction-display { background: var(--card-dark); border-radius: 15px; height: 120px; display: flex; align-items: center; justify-content: center; border: 1px solid #2a3142; position: relative; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        #big-result { font-size: 80px; font-weight: 800; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .stats-bar { background: #1a202e; padding: 8px 12px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; }
        .stat-p { color: var(--primary-blue); }
        .stat-b { color: var(--primary-red); }
        .win-count { border: 1px solid var(--text-gold); color: var(--text-gold); padding: 0 6px; border-radius: 4px; cursor: pointer; }
        .roadmap-box { background: #1a202e; border-radius: 10px; padding: 8px; border: 1px solid #2a3142; height: 150px; overflow-x: auto; display: flex; scrollbar-width: none; }
        .roadmap-box::-webkit-scrollbar { display: none; }
        .grid-column { display: flex; flex-direction: column; gap: 3px; margin-right: 3px; flex-shrink: 0; }
        .cell { width: 22px; height: 22px; background: #252d3f; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .cell.P { background: var(--primary-blue); }
        .cell.B { background: var(--primary-red); }
        .cell.T { background: var(--primary-green); }

        /* History 2 Rows Real-time */
        .status-history-grid { background: #1a202e; border-radius: 10px; padding: 8px; border: 1px solid #2a3142; display: flex; flex-direction: column; gap: 4px; overflow-x: auto; scrollbar-width: none; }
        .status-history-grid::-webkit-scrollbar { display: none; }
        .status-row { display: flex; gap: 4px; min-height: 18px; white-space: nowrap; }
        .status-icon { font-size: 14px; min-width: 18px; text-align: center; }

        .input-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-input { border: none; border-radius: 12px; height: 60px; font-size: 24px; font-weight: bold; color: #fff; cursor: pointer; background: #252d3f; }
        .btn-input.P { border-bottom: 4px solid var(--primary-blue); }
        .btn-input.B { border-bottom: 4px solid var(--primary-red); }
        .action-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-action { background: #252d3f; border: none; border-radius: 10px; padding: 12px; color: #fff; font-size: 13px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: var(--card-dark); width: 100%; border-radius: 15px; border: 1px solid var(--text-gold); padding: 15px; max-height: 85vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-area">
        <button class="settings-btn" onclick="toggleMaxSteps()">ไม้ทบ: <span id="max-steps-display">4</span></button>
    </div>
    <div class="prediction-display">
        <div id="big-result">-</div>
    </div>
    <div class="stats-bar">
        <div>
            <span class="stat-p">P:<span id="count-p">0</span></span> &nbsp;
            <span class="stat-b">B:<span id="count-b">0</span></span> &nbsp;
            <span style="color:#888">A:<span id="count-a">0</span></span>
        </div>
        <div class="win-count" onclick="openModal()">ชนะ: <span id="win-count-display">0</span></div>
    </div>
    <div class="roadmap-box" id="roadmap-container"></div>

    <div class="status-history-grid" id="history-scroll">
        <div class="status-row" id="status-row-1"></div>
        <div class="status-row" id="status-row-2"></div>
    </div>

    <div class="input-group">
        <button class="btn-input P" onclick="addResult('P')">P</button>
        <button class="btn-input T" onclick="addResult('T')" style="font-size: 18px;">T</button>
        <button class="btn-input B" onclick="addResult('B')">B</button>
    </div>
    <div class="action-group">
        <button class="btn-action" onclick="undo()">ย้อนกลับ</button>
        <button class="btn-action" onclick="resetAll()" style="color:var(--primary-red)">ล้างข้อมูล</button>
    </div>
</div>

<div id="logModal" class="modal">
    <div class="modal-content">
        <div id="log-list" style="overflow-y:auto"></div>
        <button class="btn-action" onclick="closeModal()" style="margin-top:10px">ปิด</button>
    </div>
</div>

<script>
    let history = JSON.parse(localStorage.getItem('bacc_v5_data')) || [];
    let logs = JSON.parse(localStorage.getItem('bacc_v5_logs')) || [];
    let maxSteps = parseInt(localStorage.getItem('max_steps_v5')) || 4;
    let lockedPattern = null;
    let currentStep = 1;

    const patternOrder = ["MMM", "TTT", "MTT", "TMM", "MTM", "TMT", "MMT", "TTM"];
    const patterns = { "MMM": ["M","M","M"], "TTT": ["T","T","T"], "MTT": ["M","T","T"], "TMM": ["T","M","M"], "MTM": ["M","T","M"], "TMT": ["T","M","T"], "MMT": ["M","M","T"], "TTM": ["T","T","M"] };

    function addResult(val) {
        history.push(val);
        if (val !== 'T') processLogic();
        saveAndRender();
    }

    function undo() { 
        if (history.length > 0) { 
            history.pop(); 
            rebuildState();
            saveAndRender(); 
        } 
    }

    function rebuildState() {
        lockedPattern = null;
        currentStep = 1;
        logs = [];
        const tempHistory = [...history];
        history = [];
        tempHistory.forEach(val => {
            history.push(val);
            if (val !== 'T') processLogic();
        });
    }

    function resetAll() { if(confirm("ล้างข้อมูล?")) { history = []; logs = []; lockedPattern = null; currentStep = 1; saveAndRender(); } }
    function toggleMaxSteps() { 
        maxSteps = maxSteps >= 6 ? 1 : maxSteps + 1; 
        localStorage.setItem('max_steps_v5', maxSteps); 
        rebuildState(); 
        saveAndRender();
    }

    function processLogic() {
        const dataOnlyPB = history.filter(x => x !== 'T');
        if (dataOnlyPB.length < 4) { lockedPattern = null; currentStep = 1; return; }
        
        if (lockedPattern) {
            const lastActual = dataOnlyPB[dataOnlyPB.length - 1];
            const lastPred = getPred(lockedPattern, dataOnlyPB.length - 1, dataOnlyPB);
            
            if (lastActual === lastPred) { 
                logs.push({status: 'win', step: currentStep}); 
                currentStep = 1; 
            } else { 
                if (currentStep >= maxSteps) { 
                    logs.push({status: 'loss', step: maxSteps}); 
                    currentStep = 1; 
                    lockedPattern = null; 
                } else { 
                    currentStep++; 
                } 
            }
        }
        
        if (!lockedPattern) { 
            for (let p of patternOrder) { 
                if (isTriple(p, dataOnlyPB)) { 
                    lockedPattern = p; 
                    currentStep = 1; 
                    break; 
                } 
            } 
        }
    }

    function isTriple(p, data) { 
        if (data.length < 6) return false; 
        let w = 0; 
        for (let i = data.length-1; i >= 3; i--) { 
            if (data[i] === getPred(p, i, data)) w++; else break; 
        } 
        return w >= 3; 
    }

    function getPred(p, i, data) { 
        let step = (i - 3) % 3; 
        let base = data[i-3]; 
        return (patterns[p][step] === "M") ? base : (base === 'P' ? 'B' : 'P'); 
    }

    function saveAndRender() {
        localStorage.setItem('bacc_v5_data', JSON.stringify(history));
        localStorage.setItem('bacc_v5_logs', JSON.stringify(logs));
        renderAll();
    }

    function renderAll() {
        document.getElementById('max-steps-display').innerText = maxSteps;
        document.getElementById('count-p').innerText = history.filter(x => x === 'P').length;
        document.getElementById('count-b').innerText = history.filter(x => x === 'B').length;
        document.getElementById('count-a').innerText = history.length;
        document.getElementById('win-count-display').innerText = logs.filter(l => l.status === 'win').length;

        // Roadmap
        const container = document.getElementById('roadmap-container');
        container.innerHTML = "";
        let colDiv = document.createElement('div'); colDiv.className = 'grid-column';
        for (let i = 0; i < history.length; i++) {
            if (i > 0 && i % 6 === 0) { container.appendChild(colDiv); colDiv = document.createElement('div'); colDiv.className = 'grid-column'; }
            const cell = document.createElement('div'); cell.className = `cell ${history[i]}`; cell.innerText = history[i]; colDiv.appendChild(cell);
        }
        if (colDiv.children.length > 0 || history.length === 0) {
            for (let j = colDiv.children.length; j < 6; j++) { const empty = document.createElement('div'); empty.className = 'cell'; colDiv.appendChild(empty); }
            container.appendChild(colDiv);
        }
        container.scrollLeft = container.scrollWidth;

        // ✅❌ History Real-time 2 Rows
        const r1 = document.getElementById('status-row-1');
        const r2 = document.getElementById('status-row-2');
        r1.innerHTML = ""; 
        r2.innerHTML = "";
        
        logs.forEach((l, idx) => {
            const s = document.createElement('span');
            s.className = 'status-icon';
            s.innerText = l.status === 'win' ? '✅' : '❌';
            // สลับแถวเพื่อให้เรียงไปข้างหน้าพร้อมกัน
            if (idx % 2 === 0) r1.appendChild(s); 
            else r2.appendChild(s);
        });
        
        // เลื่อนประวัติไปขวาสุดเสมอ
        const hScroll = document.getElementById('history-scroll');
        hScroll.scrollLeft = hScroll.scrollWidth;

        // Prediction
        const bigRes = document.getElementById('big-result');
        const dataOnlyPB = history.filter(x => x !== 'T');
        if (lockedPattern && dataOnlyPB.length >= 3) {
            const next = getPred(lockedPattern, dataOnlyPB.length, dataOnlyPB);
            bigRes.innerText = `${currentStep}${next}`;
            bigRes.style.color = next === 'P' ? 'var(--primary-blue)' : 'var(--primary-red)';
        } else { 
            bigRes.innerText = "-"; 
            bigRes.style.color = "#444"; 
        }
    }

    function openModal() {
        const list = document.getElementById('log-list'); list.innerHTML = "";
        logs.forEach((l, i) => {
            const item = document.createElement('div'); item.className = 'log-item';
            item.style = "padding: 8px 0; border-bottom: 1px solid #2a3142; display: flex; justify-content: space-between; font-size: 13px;";
            item.innerHTML = `<span>รอบ #${i+1}</span> <span>${l.status === 'win' ? '✅ ชนะ' : '❌ แพ้'} (ไม้ ${l.step})</span>`;
            list.appendChild(item);
        });
        document.getElementById('logModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('logModal').style.display = 'none'; }
    
    renderAll();
</script>
</body>
</html>
